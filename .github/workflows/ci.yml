# Build + test on every PR / main push. Catches regressions before
# they hit a release tag.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, macos-14]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.15.2
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Install C toolchain (Linux)
        if: runner.os == 'Linux'
        # `libstdc++-dev` (any recent version on the runner image)
        # is required so rust-lld can resolve the libcxx runtime
        # symbols that the Zig-built ghostty static archive
        # references (`__cxa_throw`, `std::length_error` vtable, …).
        # build-essential brings the runtime in but not the
        # link-time stubs on `ubuntu-22.04`.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
          # Prefer the version that matches the runner's default gcc.
          sudo apt-get install -y libstdc++-12-dev || \
            sudo apt-get install -y libstdc++-11-dev || \
            sudo apt-get install -y libstdc++-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
